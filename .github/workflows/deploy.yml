name: Deploy to fj.tomhe.app

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't allow overlapping deploys.
concurrency:
  group: deploy
  cancel-in-progress: false

# Minimum perms — checkout reads the repo; rsync + ssh-action use deploy
# secrets, not the GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install + build
        run: |
          npm ci
          npm run build

      - name: Rsync Deployments Action
        uses: Burnett01/rsync-deployments@v8
        with:
          switches: -avz --delete --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='.env.local' --exclude='.next/cache'
          path: ./
          remote_path: /var/www/fj/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via rsync + restart service
        uses: appleboy/ssh-action@v1.2.5
        env:
          WEB_ROOT_PATH: ${{ secrets.WEB_ROOT_PATH }}
          VENV_PATH: ${{ secrets.VENV_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # appleboy/ssh-action does NOT auto-propagate the step's `env:`
          # block to the remote shell — variable names have to be listed
          # here explicitly. WEB_ROOT_PATH historically appeared to "work"
          # only because it also happens to be defined in the remote
          # machine's profile; VENV_PATH isn't, and that mismatch shipped
          # an empty value to the remote and made
          # `source "${VENV_PATH}/bin/activate"` expand to
          # `source "/bin/activate"`.
          envs: WEB_ROOT_PATH,VENV_PATH
          script: |
            # `set -e` is critical here: previously the SSH step silently
            # ignored failures of `python scripts/build-example-fjms.py`
            # because the next command (`sudo systemctl restart fj`) still
            # exited 0, masking the whole step as success. That's how the
            # first post-merge deploy passed CI but shipped a manifest with
            # no .fjm files, and the cache silently fell back to /api/compile.
            set -eo pipefail
            # Diagnostic guards — if the env propagation breaks again or a
            # secret is blank, fail loudly with a precise message instead of
            # the unhelpful "/bin/activate: No such file or directory".
            : "${WEB_ROOT_PATH:?WEB_ROOT_PATH secret missing or did not propagate}"
            : "${VENV_PATH:?VENV_PATH secret missing or did not propagate}"
            # appleboy/ssh-action runs the script in a non-interactive shell,
            # so the deploy user's ~/.bashrc — which contains the standard
            # nvm init — bails early on `[ -z "$PS1" ] && return` and `npm`
            # never lands on PATH. Source nvm.sh explicitly here so `npm ci`
            # below can find it.
            #
            # `set +e` around the source: nvm.sh's auto-use path can legitimately
            # exit non-zero on a host whose default alias is missing or whose
            # current symlink is broken (nvm-sh/nvm#2429). Under `set -e` that
            # aborts the deploy with no diagnostic of its own. Drop strict
            # mode just for the source, then check `npm` is on PATH afterwards
            # — THAT is the diagnostic we actually want.
            set +e
            export NVM_DIR="$HOME/.nvm"
            # shellcheck disable=SC1091
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            set -e
            command -v npm >/dev/null \
              || { echo "npm not on PATH after sourcing nvm.sh — check default alias on the remote" >&2; exit 1; }
            cd "${WEB_ROOT_PATH}"
            source "${VENV_PATH}/bin/activate"
            # `npm ci --legacy-peer-deps` instead of `npm config set legacy-peer-deps true`
            # so we don't mutate the deploy user's global ~/.npmrc on every deploy
            # (would now hard-fail under `set -e` if that file were ever read-only or
            # the home directory full).
            npm ci --legacy-peer-deps --omit=dev
            # Build cached .fjm binaries for built-in examples. The venv
            # provides `fj` (flipjump pip install). Must run AFTER `npm ci`
            # (so dependent tooling is in place) and BEFORE the service
            # restart (so the first cache requests after a deploy hit fresh
            # files). The TypeScript half — public/example-fjms/manifest.json
            # — was already rsynced from the GA runner's prebuild step.
            # `python3` (not bare `python`) — the activated venv exposes both,
            # but explicit is safer if the venv layout ever changes.
            python3 scripts/build-example-fjms.py
            sudo systemctl restart fj

      - name: Smoke test (wait for 200 OK)
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://fj.tomhe.app)
            echo "Attempt $i: HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          echo "Smoke test failed — site did not return 200 after restart"
          exit 1
