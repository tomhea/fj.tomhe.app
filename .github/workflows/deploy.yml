name: Deploy to fj.tomhe.app

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't allow overlapping deploys.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install + build
        run: | 
          npm ci
          npm run build

      - name: Deploy via rsync + restart service
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/fj/
            rsync -avz --delete --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='.env.local' --exclude='.next/cache' .
            npm config set legacy-peer-deps true
            npm ci --omit=dev
            sudo systemctl restart caddy
