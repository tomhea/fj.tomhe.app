name: Deploy to fj.tomhe.app

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't allow overlapping deploys.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install + build
        run: | 
          npm ci
          npm run build

      - name: Rsync Deployments Action
        uses: Burnett01/rsync-deployments@v8
        with:
          switches: -avz --delete --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='.env.local' --exclude='.next/cache'
          path: ./
          remote_path: /var/www/fj/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
        
      - name: Deploy via rsync + restart service
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/fj/
            source /root/.venv/bin/activate
            npm config set legacy-peer-deps true
            npm ci --omit=dev
            sudo systemctl restart fj

      - name: Smoke test (wait for 200 OK)
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://fj.tomhe.app)
            echo "Attempt $i: HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          echo "Smoke test failed — site did not return 200 after restart"
          exit 1
