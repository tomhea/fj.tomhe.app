name: Deploy to fj.tomhe.app

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't allow overlapping deploys.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6.4.0
        with:
          cache: 'npm'

      - name: Install + build
        run: |
          npm ci
          npm run build

      - name: Set up SSH key
        env:
          SSH_KEY:  ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          # printf with single-quoted SSH_KEY avoids any chance of shell
          # parsing the secret value.
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          # Preserve server-side state that should survive deploys:
          #   .env.local      — secrets and per-host config
          #   node_modules/   — installed server-side (npm ci on the host)
          #   .next/cache     — next.js build cache
          # We rsync the working tree (source + built .next/) and let the
          # server run `npm ci --omit=dev && systemctl restart fj` post-rsync.
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env.local' \
            --exclude='.next/cache' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            ./ "$SSH_USER@$SSH_HOST:/var/www/fj/"

      - name: Reinstall + restart service on host
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            'cd /var/www/fj && npm ci --omit=dev && sudo systemctl restart fj'
