name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel earlier runs on the same branch when a new push lands. Failing tests
# on stale commits aren't useful and the GitHub Actions queue isn't free.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-api:
    name: Unit + API + WS-runner tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Python (for fj + bf2fj)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flipjump (provides fj; bf2fj is optional)
        run: |
          python -m pip install --upgrade pip
          python -m pip install flipjump
          # `fj` is the only required tool; bf2fj-dependent tests auto-skip
          # when it isn't on PATH (some pip versions ship only `fj`).
          fj --help > /dev/null
          if command -v bf2fj > /dev/null; then
            echo "bf2fj available"
          else
            echo "bf2fj NOT available — bf2fj-dependent tests will skip"
          fi

      - name: Install npm deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Vitest (unit, API, WS runner)
        run: npm test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: unit-and-api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Python (for fj on PATH)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flipjump (for the dev server's fj invocation)
        run: |
          python -m pip install --upgrade pip
          python -m pip install flipjump
          fj --help > /dev/null

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright browsers
        # `with-deps` brings in system libraries Chromium needs on Ubuntu.
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: npx playwright test
        env:
          # Generous WS limits for E2E to avoid rate-limit interference
          # across browser tabs / retries.
          WS_MAX_CONNECTIONS_PER_IP: '50'
          WS_MAX_TOTAL_CONNECTIONS: '100'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
