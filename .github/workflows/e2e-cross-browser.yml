name: Cross-Browser E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'  # Sunday 6 AM UTC

# Minimum perms — only checkout reads the repo; upload-artifact@v4 uses the
# actions runtime API, not the GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  cross-browser:
    name: Firefox + WebKit E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flipjump
        run: |
          python -m pip install --upgrade pip
          python -m pip install flipjump
          fj --help > /dev/null

      - run: npm ci

      - name: Install Firefox + WebKit with system deps
        run: npx playwright install --with-deps firefox webkit

      - name: Run Playwright (Firefox + WebKit)
        run: npx playwright test --project=firefox --project=webkit
        env:
          ALL_BROWSERS: '1'
          WS_MAX_CONNECTIONS_PER_IP: '50'
          WS_MAX_TOTAL_CONNECTIONS: '100'

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cross-browser-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
